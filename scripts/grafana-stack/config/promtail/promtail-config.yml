server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:

  # ─── System logs (host) ───────────────────────────────────────────────────
  - job_name: system
    static_configs:
      - targets:
          - localhost
        labels:
          job: varlogs
          host: monitoring-server
          __path__: /var/log/*.log

  # ─── FortiGate syslog (UDP/TCP 1514) ─────────────────────────────────────
  - job_name: fortigate
    syslog:
      listen_address: 0.0.0.0:1514
      listen_protocol: tcp
      idle_timeout: 60s
      label_structured_data: yes
      labels:
        job: fortigate
    relabel_configs:
      - source_labels: [__syslog_message_hostname]
        target_label: host
      - source_labels: [__syslog_message_app_name]
        target_label: app
    pipeline_stages:
      # Parse FortiGate key=value log format
      - regex:
          expression: '.*type="(?P<type>[^"]*)".*subtype="(?P<subtype>[^"]*)".*level="(?P<level>[^"]*)".*action="(?P<action>[^"]*)".*'
      - labels:
          type:
          subtype:
          level:
          action:
      # Extract source/destination for traffic logs
      - regex:
          expression: '.*srcip=(?P<srcip>\S+).*dstip=(?P<dstip>\S+).*'
      - labels:
          srcip:
          dstip:
