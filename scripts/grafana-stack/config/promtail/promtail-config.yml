server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:

  # ─── System logs (host) ───────────────────────────────────────────────────
  - job_name: system
    static_configs:
      - targets:
          - localhost
        labels:
          job: varlogs
          host: monitoring-server
          __path__: /var/log/*.log

  # ─── FortiGate logs (written by rsyslog on host) ─────────────────────────
  - job_name: fortigate
    static_configs:
      - targets:
          - localhost
        labels:
          job: fortigate
          __path__: /var/log/fortigate/fortigate.log
    pipeline_stages:
      # Extract FortiGate key=value fields as labels
      - regex:
          expression: '.*type="(?P<type>[^"]*)".*'
      - regex:
          expression: '.*subtype="(?P<subtype>[^"]*)".*'
      - regex:
          expression: '.*level="(?P<level>[^"]*)".*'
      - regex:
          expression: '.*action="(?P<action>[^"]*)".*'
      - labels:
          type:
          subtype:
          level:
          action:
