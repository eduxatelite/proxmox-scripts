global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

# ─── Alerting (optional, uncomment if using Alertmanager) ──────────────────
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ['alertmanager:9093']

# ─── Rule files ────────────────────────────────────────────────────────────
rule_files: []

scrape_configs:

  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Grafana metrics
  - job_name: "grafana"
    static_configs:
      - targets: ["grafana:3000"]

  # ─── Proxmox VE (pve-exporter) ─────────────────────────────────────────
  # Generated by install.sh — do not edit manually
  # PROXMOX_SCRAPE_CONFIGS
